name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:   # enable manual run

jobs:
  deploy:
    concurrency: deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
      - name: Install mdBook
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook
          version: "0.5"

      #- name: Install mdBook
        # If the cache already has 0.5, Cargo will instantly skip this.
        # If the cache has 0.4, Cargo will see the version mismatch and overwrite it with 0.5.
        #run: cargo install mdbook --version "^0.5" --force

      - name: Install mdBook-sidenote
        run: |
          wget -q "https://github.com/geordi/mdbook-sidenote/releases/download/release/mdbook-sidenote"
          chmod +x mdbook-sidenote
          mkdir -p ~/bin
          mv mdbook-sidenote ~/bin/
          echo "$HOME/bin" >> $GITHUB_PATH

      #- name: Cache mdbook plugins
      #  uses: actions/cache@v4
      #  with:
      #    path: |
      #      ~/.cargo/bin/mdbook-plantuml
      #      ~/.cargo/bin/mdbook-linkcheck
      #      ~/.cargo/.crates.toml
      #      ~/.cargo/.crates2.json
      #    key: ${{ runner.os }}-cache-mdbook-${{ github.run_id }}
      #    restore-keys: |
      #      ${{ runner.os }}-cache-mdbook-

      #- name: Install mdbook plugins
      #  run: |
      #    cargo install mdbook-plantuml
      #    cargo install mdbook-linkcheck

      - name: Build
        run: RUST_BACKTRACE=1 mdbook build
        env:
          MDBOOK_OUTPUT__HTML__SITE_URL: /skj-skripta/

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: book
          clean: true
          silent: true # do not print logs
